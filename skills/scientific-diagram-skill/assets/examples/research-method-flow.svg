<svg xmlns="http://www.w3.org/2000/svg" width="960" height="340" viewBox="0 0 960 340" role="img" aria-labelledby="title desc">
  <title id="title">Research method flow</title>
  <desc id="desc">A clean-room workflow diagram showing data inspection, MATLAB figure rendering, mfigci checks, and public documentation handoff.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
  <rect x="24" y="42" width="270" height="214" fill="#f6f8fa" stroke="#6b7280"/>
  <rect x="344" y="42" width="286" height="214" fill="#f6f8fa" stroke="#6b7280"/>
  <rect x="680" y="42" width="256" height="214" fill="#f6f8fa" stroke="#6b7280"/>
  <text x="44" y="76" font-family="Arial, sans-serif" font-size="16" fill="#111827">Data and planning</text>
  <text x="364" y="76" font-family="Arial, sans-serif" font-size="16" fill="#111827">Render and review</text>
  <text x="700" y="76" font-family="Arial, sans-serif" font-size="16" fill="#111827">Publishable artifacts</text>
  <g font-family="Arial, sans-serif" font-size="14" fill="#111827" text-anchor="middle">
    <rect x="60" y="124" width="112" height="50" rx="6" fill="#ffffff" stroke="#2563eb"/>
    <text x="116" y="154">Input data</text>
    <rect x="194" y="124" width="112" height="50" rx="6" fill="#ffffff" stroke="#2563eb"/>
    <text x="250" y="154">Inspect schema</text>
    <rect x="380" y="124" width="112" height="50" rx="6" fill="#ffffff" stroke="#2563eb"/>
    <text x="436" y="154">Plot plan</text>
    <rect x="518" y="124" width="122" height="50" rx="6" fill="#eef6ff" stroke="#0891b2"/>
    <text x="579" y="154">MATLAB figure</text>
    <rect x="714" y="124" width="112" height="50" rx="6" fill="#fff7ed" stroke="#d97706"/>
    <text x="770" y="154">mfigci check</text>
    <rect x="848" y="124" width="74" height="50" rx="6" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="885" y="145">README</text>
    <text x="885" y="162">or gallery</text>
    <rect x="714" y="198" width="208" height="42" rx="6" fill="#ffffff" stroke="#6b7280"/>
    <text x="818" y="224">Provenance note</text>
  </g>
  <g fill="none" stroke="#374151" stroke-width="2" marker-end="url(#arrow)">
    <path d="M172 149 H190"/>
    <path d="M306 149 H376"/>
    <path d="M492 149 H514"/>
    <path d="M640 149 H710"/>
    <path d="M826 149 H844"/>
  </g>
  <path d="M770 174 V194" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
</svg>
